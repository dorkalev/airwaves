<!DOCTYPE html>
<html lang="en">
<head>
<script src="/site.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRWAVES — moderation</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%F0%9F%9B%A1%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
  :root { --hot:#ff2e88; --cyan:#29f4ff; --lime:#b6ff2e; --bg:#0a0a12; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:#fff; font-family:'Fragment Mono', monospace; min-height:100vh; }
  .wrap { max-width:1100px; margin:0 auto; padding:40px 20px 60px; }
  .title { font-family:'Bangers', cursive; font-size:clamp(38px,7vw,64px); text-shadow:3px 3px 0 var(--hot); transform:rotate(-2deg); }
  .btn { font-family:'Bangers', cursive; font-size:22px; color:#0a0a12; background:var(--lime); border:none; border-radius:12px; padding:12px 28px; cursor:pointer; box-shadow:0 4px 0 #5c8a0e; margin-top:20px; }
  .who { font-size:12px; color:#9aa; margin-top:16px; } .who b { color:var(--cyan); font-weight:400; } .who a { color:var(--hot); cursor:pointer; }
  #gate.err .who { color:var(--hot); }
  .count { font-size:12px; color:#778; margin:18px 0 6px; }
  .board { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  .run { background:#12121e; border:1px solid #ffffff14; border-radius:14px; overflow:hidden; position:relative; }
  .run video { width:100%; aspect-ratio:4/3; object-fit:cover; background:#000; display:block; cursor:zoom-in; }
  .run .meta { padding:9px 12px; font-size:11px; color:#9aa; }
  .kill { position:absolute; top:8px; right:8px; font-size:11px; color:#ff8aa8; border:1px solid #ff2e8855; border-radius:8px; padding:5px 10px; cursor:pointer; background:#000000cc; }
  .kill:hover { background:#7a0b3d; color:#fff; }
  .run .rv { position:relative; }
  .run video { filter:brightness(.42); transition:filter .25s ease; }
  .run video.live { filter:none; }
  .run .vb { position:absolute; top:8px; left:8px; z-index:1; font-family:'Fragment Mono', monospace; font-size:10px; font-weight:bold; color:#0a0a12; background:var(--lime); border-radius:6px; padding:2px 6px; }
  .run .mx { position:absolute; bottom:8px; right:8px; font-size:11px; color:#cfe; background:#000000cc; border:1px solid #ffffff33; border-radius:6px; padding:2px 7px; cursor:pointer; }
  .run .mx:hover { border-color:var(--cyan); color:#fff; }
  #pvLight { position:fixed; inset:0; z-index:200; display:none; place-items:center; background:#0a0a12ee; backdrop-filter:blur(8px); padding:24px; }
  #pvLight.show { display:grid; }
  #pvLight .lb { position:relative; }
  #pvLight video { max-width:90vw; max-height:86vh; border-radius:12px; background:#000; box-shadow:0 20px 60px #000c; display:block; }
  #pvLight .lx { position:absolute; top:-15px; right:-15px; width:36px; height:36px; border-radius:50%; border:none; background:var(--hot); color:#fff; font-size:16px; cursor:pointer; }
  #pvConfirm { position:fixed; inset:0; z-index:201; display:none; place-items:center; background:#0a0a12dd; backdrop-filter:blur(6px); padding:24px; }
  #pvConfirm.show { display:grid; }
  #pvConfirm .cf { background:#12121e; border:1px solid #ffffff1c; border-radius:16px; padding:26px; max-width:340px; text-align:center; }
  #pvConfirm p { font-size:14px; color:#fff; line-height:1.5; } #pvConfirm p span { display:block; color:#889; font-size:12px; margin-top:7px; }
  #pvConfirm .b { display:flex; gap:10px; justify-content:center; margin-top:20px; }
  #pvConfirm button { cursor:pointer; font-family:'Fragment Mono', monospace; font-size:13px; border-radius:9px; padding:9px 18px; border:1px solid #ffffff22; background:transparent; color:#cfe; }
  #pvConfirm .yes { background:var(--hot); border:none; color:#fff; font-weight:bold; }
  #more { color:#778; font-size:12px; padding:16px 0; }
  .back { color:var(--cyan); font-size:12px; text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">AIRWAVES 🛡️</div>
  <div id="gate">
    <button class="btn" id="signin">Sign in with Google</button>
    <div class="who" id="who"></div>
  </div>
  <div id="adminui" style="display:none">
    <div class="count" id="count"></div>
    <div class="board" id="board"></div>
    <div id="more"></div>
    <a class="back" href="./">← back to AIRWAVES</a>
  </div>
</div>
<script type="module">
import { getFirebase, listSessions, getUrl, getPosterUrl, deleteSession, ADMIN_EMAIL, DEMO } from './firebase.js?v=2';
import { GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
const $ = id => document.getElementById(id);
const { auth } = await getFirebase();
let loaded = false;
$('signin').onclick = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(e => { $('gate').classList.add('err'); $('who').textContent = 'sign-in failed: ' + (e.code || e.message); });
onAuthStateChanged(auth, user => {
  const isAdmin = user && user.email === ADMIN_EMAIL && user.emailVerified;
  $('adminui').style.display = 'none'; $('gate').classList.remove('err');
  if (isAdmin) {
    $('signin').style.display = 'none';
    $('who').innerHTML = `signed in as <b>${user.email}</b> — <a id="out">sign out</a>`;
    $('out').onclick = () => signOut(auth).then(() => location.reload());
    $('adminui').style.display = ''; if (!loaded) { loaded = true; loadAll(); }
  } else if (user && user.email) {
    $('signin').style.display = 'none'; $('gate').classList.add('err');
    $('who').innerHTML = `signed in as ${user.email} — not authorized. <a id="out">sign out</a>`;
    $('out').onclick = () => signOut(auth).then(() => location.reload());
  } else { $('signin').style.display = ''; $('who').textContent = ''; }
});
function openLight(urlP) {
  let m = document.getElementById('pvLight');
  if (!m) { m = document.createElement('div'); m.id = 'pvLight';
    m.innerHTML = `<div class="lb"><button class="lx">✕</button><video controls playsinline></video></div>`;
    document.body.appendChild(m);
    const close = () => { const v = m.querySelector('video'); v.pause(); v.removeAttribute('src'); v.load(); m.classList.remove('show'); };
    m.onclick = e => { if (e.target === m) close(); }; m.querySelector('.lx').onclick = close;
  }
  const v = m.querySelector('video'); v.removeAttribute('src'); m.classList.add('show');
  urlP.then(u => { if (u) { v.src = u; v.play().catch(() => {}); } });
}
function confirmDelete(onYes) {
  let m = document.getElementById('pvConfirm');
  if (!m) { m = document.createElement('div'); m.id = 'pvConfirm';
    m.innerHTML = `<div class="cf"><p>Delete this clip?<span>It’s removed from the gallery for everyone — can’t be undone.</span></p><div class="b"><button class="no">Cancel</button><button class="yes">Delete</button></div></div>`;
    document.body.appendChild(m); m.onclick = e => { if (e.target === m) m.classList.remove('show'); };
  }
  m.classList.add('show');
  m.querySelector('.no').onclick = () => m.classList.remove('show');
  m.querySelector('.yes').onclick = () => { m.classList.remove('show'); onYes(); };
}
async function loadAll() {
  const board = $('board'); $('more').textContent = 'loading…';
  try {
    let token = null, all = [];
    do { const { items, next } = await listSessions(token, 100); all.push(...items); token = next; } while (token);
    $('count').textContent = `${all.length} session${all.length === 1 ? '' : 's'} · ${DEMO}`;
    $('more').textContent = all.length ? '' : 'no sessions yet';
    for (const s of all) {
      const el = document.createElement('div'); el.className = 'run';
      el.innerHTML = `<div class="rv"><video playsinline loop muted preload="none"></video><span class="vb">${s.version || '?'}</span><button class="mx" title="enlarge">⛶</button></div><div class="meta">${new Date(s.ts).toLocaleString()} · ${s.version || 'unknown'}</div><button class="kill">🗑 delete</button>`;
      const v = el.querySelector('video'); getPosterUrl(s.name).then(u => { if (u) v.poster = u; });
      v.addEventListener('play', () => { v.classList.add('live'); board.querySelectorAll('video').forEach(o => { if (o !== v) o.pause(); }); });   // only one plays
      v.addEventListener('pause', () => { v.classList.remove('live'); try { v.currentTime = 0; } catch (e) {} });                                   // dim back to the start
      v.addEventListener('click', async () => { if (!v.src) { const u = await getUrl(s.item).catch(() => null); if (u) { v.src = u; v.muted = false; v.play().catch(() => {}); } } else if (v.paused) { v.play().catch(() => {}); } else { v.pause(); } });
      el.querySelector('.mx').onclick = () => openLight(getUrl(s.item).catch(() => null));
      const btn = el.querySelector('.kill');
      btn.onclick = () => confirmDelete(async () => { btn.textContent = '…'; try { await deleteSession(s.item); el.remove(); } catch (e) { btn.textContent = 'failed'; } });
      board.appendChild(el);
    }
  } catch (e) { console.error(e); $('more').textContent = 'error: ' + (e.code || e.message); }
}
</script>
</body>
</html>
